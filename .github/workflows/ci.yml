name: CI

on:
  push:
    branches: [lab8-9]
  pull_request:
    branches: [lab8-9]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run build

      - run: npm test
